<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Explorer les rubriques de l'Agenda du jour."
    >

    <title>
        Explorer l’Agenda
    </title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <header class="site-header">

        <div id="barre-navigation"></div>

    </header>

    <main>

        <section class="section-menu-principal">

            <h1 class="titre-menu-principal">
                Explorer l’Agenda
            </h1>

            <nav
                class="explorer-menu"
                aria-label="Menu principal"
            >

                <!-- Personnalités -->

                <div class="explorer-carte explorer-personnalites">

                    <a
                        class="explorer-carte-lien"
                        href="personnalites.html"
                    >

                        <div class="explorer-icone">
                            🎂
                        </div>

                        <div class="explorer-contenu">

                            <h2>
                                Personnalités du jour
                            </h2>

                            <p>
                                Naissances et disparitions à cette date
                            </p>

                        </div>

                        <div
                            class="explorer-fleche"
                            aria-hidden="true"
                        >
                            →
                        </div>

                    </a>

                    <a
                        href="message.html?origine=Personnalités"
                        class="explorer-message"
                        aria-label="Écrire un message concernant les personnalités"
                        title="Écrire un message"
                    >
                        ✉️
                    </a>

                </div>

                <!-- Culture -->

                <div class="explorer-carte explorer-culture">

                    <a
                        class="explorer-carte-lien"
                        href="culture.html"
                    >

                        <div class="explorer-icone">
                            🎭
                        </div>

                        <div class="explorer-contenu">

                            <h2>
                                Culture du jour
                            </h2>

                            <p>
                                Musique, cinéma, livres et concerts
                            </p>

                        </div>

                        <div
                            class="explorer-fleche"
                            aria-hidden="true"
                        >
                            →
                        </div>

                    </a>

                    <a
                        href="message.html?origine=Culture"
                        class="explorer-message"
                        aria-label="Écrire un message concernant la culture"
                        title="Écrire un message"
                    >
                        ✉️
                    </a>

                </div>

                <!-- Événements -->

                <div class="explorer-carte explorer-evenements">

                    <a
                        class="explorer-carte-lien"
                        href="evenements.html"
                    >

                        <div class="explorer-icone">
                            📜
                        </div>

                        <div class="explorer-contenu">

                            <h2>
                                Événements du jour
                            </h2>

                            <p>
                                Les faits marquants survenus à cette date
                            </p>

                        </div>

                        <div
                            class="explorer-fleche"
                            aria-hidden="true"
                        >
                            →
                        </div>

                    </a>

                    <a
                        href="message.html?origine=Événements"
                        class="explorer-message"
                        aria-label="Écrire un message concernant les événements"
                        title="Écrire un message"
                    >
                        ✉️
                    </a>

                </div>

            </nav>

        </section>

    </main>

    <div id="pied-page"></div>

    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>

</body>

</html>
